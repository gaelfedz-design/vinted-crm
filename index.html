<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vinted CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:2px;}
.app{min-height:100vh;}
.header{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid #e5e5ea;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.logo-sub{font-size:10px;color:#86868b;margin-top:1px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#34c759;}
.sync-dot.syncing{background:#ff9500;animation:blink .5s infinite;}
.sync-dot.error{background:#ff3b30;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.apill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
.apill-red{background:#fff3f3;color:#ff3b30;border:1px solid #ffd5d5;}
.apill-yellow{background:#fff8ec;color:#ff9500;border:1px solid #ffe0a0;}
.nav{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid #e5e5ea;display:flex;overflow-x:auto;padding:0 20px;}
.nav::-webkit-scrollbar{display:none;}
.nb{padding:10px 14px;background:none;border:none;color:#86868b;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.nb.active{color:#1d1d1f;border-bottom-color:#1d1d1f;}
.nb:hover:not(.active){color:#1d1d1f;}
.content{padding:16px 20px;max-width:1100px;margin:0 auto;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr;}.fr2,.fr3{grid-template-columns:1fr !important;}}
.card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:16px;}
.csm{background:#f5f5f7;border-radius:10px;padding:12px;}
.kl{font-size:10px;color:#86868b;font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.kv{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.ks{font-size:11px;color:#86868b;margin-top:3px;}
.cg{color:#34c759 !important;}.cr{color:#ff3b30 !important;}.cy{color:#ff9500 !important;}.cb{color:#007aff !important;}.cp{color:#8b5cf6 !important;}
.sec{font-size:14px;font-weight:600;margin:18px 0 10px;letter-spacing:-.2px;}
.sec:first-child{margin-top:0;}
.btn{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;}
.btnp{background:#1d1d1f;color:#fff;}
.btnp:hover{background:#3a3a3c;}
.btng{background:#f2f2f7;color:#1d1d1f;border:none;}
.btng:hover{background:#e5e5ea;}
.btnsm{padding:5px 10px;font-size:12px;border-radius:8px;}
.btnd{background:transparent;color:#ff3b30;border:1px solid #ffd5d5;padding:4px 9px;font-size:11px;border-radius:7px;cursor:pointer;font-family:inherit;}
.btne{background:transparent;color:#007aff;border:1px solid #c7e0ff;padding:4px 9px;font-size:11px;border-radius:7px;cursor:pointer;font-family:inherit;}
.fl{font-size:11px;color:#86868b;margin-bottom:4px;display:block;font-weight:500;}
.fi{width:100%;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:9px;padding:9px 11px;color:#1d1d1f;font-size:13px;outline:none;font-family:inherit;}
.fi:focus{border-color:#1d1d1f;background:#fff;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fg{margin-bottom:10px;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:400px;}
.tbl th{text-align:left;padding:8px 10px;color:#86868b;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #f2f2f7;}
.tbl td{padding:10px;border-bottom:1px solid #f9f9f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:#fafafa;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.bgg{background:#e8faf0;color:#34c759;}.bgr{background:#fff3f3;color:#ff3b30;}.bgy{background:#fff8ec;color:#ff9500;}.bgb{background:#f0f7ff;color:#007aff;}.bgp{background:#f5f0ff;color:#8b5cf6;}.bga{background:#f2f2f7;color:#86868b;}
.tag{display:inline-block;background:#f2f2f7;color:#86868b;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:500;}
.ab{border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.abr{background:#fff3f3;border-left:3px solid #ff3b30;}
.aby{background:#fff8ec;border-left:3px solid #ff9500;}
.abg{background:#e8faf0;border-left:3px solid #34c759;}
.abb{background:#f0f7ff;border-left:3px solid #007aff;}
.abt{font-weight:600;font-size:13px;margin-bottom:2px;}
.abm{font-size:11px;color:#86868b;}
.pbt{height:4px;background:#f2f2f7;border-radius:2px;overflow:hidden;margin-top:4px;}
.pbf{height:100%;border-radius:2px;}
.mr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mr:last-child{margin-bottom:0;}
.ml{font-size:11px;color:#86868b;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mt{flex:1;height:5px;background:#f2f2f7;border-radius:3px;overflow:hidden;}
.mf{height:100%;border-radius:3px;}
.mv{font-size:11px;color:#1d1d1f;width:50px;text-align:right;flex-shrink:0;font-weight:600;}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.empty{text-align:center;color:#c7c7cc;padding:30px;font-size:13px;}
.div{border:none;border-top:1px solid #f2f2f7;margin:12px 0;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
@media(min-width:600px){.mo{align-items:center;}}
.md{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
@media(min-width:600px){.md{border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);}}
.mdt{font-size:16px;font-weight:700;margin-bottom:18px;}
.pwf{position:relative;}
.pwe{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#86868b;font-size:12px;font-family:inherit;}
.ic{display:inline-flex;align-items:center;background:#f5f5f7;border-radius:7px;padding:3px 8px;font-size:11px;color:#86868b;margin:2px;}
.pp{background:#f5f5f7;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;}
.ppi{display:flex;flex-direction:column;gap:2px;}
.ppv{font-size:14px;font-weight:700;}
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}
.sp{width:26px;height:26px;border:2px solid #e5e5ea;border-top-color:#1d1d1f;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sg{background:#fff;border:1px solid #e5e5ea;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.sgh{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px;}
.sgh:hover{background:#fafafa;}
.sgb{border-top:1px solid #f2f2f7;padding:10px 14px;}
.chv{font-size:11px;color:#86868b;transition:transform .2s;flex-shrink:0;}
.chv.open{transform:rotate(90deg);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const TABS = ["Dashboard","Ventas","Pedidos","Stock","Gastos","Caja","Cuentas","Alertas"];
const ECATS = ["Packaging","Transporte","Publicidad","Suscripciones","Otro"];
const STOCK_MIN = 30;
const FB = {apiKey:"AIzaSyDOXzUoalwy-nScM1TaHzGGQ7rnoPnquU4",authDomain:"vinted-crm-bd15e.firebaseapp.com",projectId:"vinted-crm-bd15e"};
const IS = {accounts:[{id:1,name:"Cuenta 1",phone:"",email:"",password:"",bank:"",desc:"",tag:""},{id:2,name:"Cuenta 2",phone:"",email:"",password:"",bank:"",desc:"",tag:""}],sales:[],stock:[],expenses:[],orders:[],caja:[],alertConfig:{low:5,urgent:2}};
firebase.initializeApp(FB);
const db = firebase.firestore();
const f = n => (parseFloat(n)||0).toFixed(2)+"€";
const fd = d => d?new Date(d).toLocaleDateString("es",{day:"2-digit",month:"2-digit",year:"2-digit"}):"—";

function App(){
  const [st,setSt]=useState(null);
  const [tab,setTab]=useState("Dashboard");
  const [sync,setSync]=useState("syncing");
  useEffect(()=>{
    const u=db.collection("crm").doc("data").onSnapshot(snap=>{
      setSt(snap.exists?{...IS,...snap.data()}:IS);
      if(!snap.exists) db.collection("crm").doc("data").set(IS);
      setSync("synced");
    },()=>setSync("error"));
    return()=>u();
  },[]);
  const upd=useCallback(fn=>{
    setSt(prev=>{
      const ns=typeof fn==="function"?fn(prev):fn;
      setSync("syncing");
      db.collection("crm").doc("data").set(ns).then(()=>setSync("synced")).catch(()=>setSync("error"));
      return ns;
    });
  },[]);
  if(!st) return <div className="ls"><div className="sp"/><div style={{color:"#86868b",fontSize:13}}>Cargando...</div></div>;

  const stock=st.stock||[], sales=st.sales||[], orders=st.orders||[], expenses=st.expenses||[], caja=st.caja||[];
  const totalUnits=stock.reduce((a,i)=>a+i.qty,0);
  const stockAlert=totalUnits<STOCK_MIN;
  const se=sales.map(s=>{const it=stock.find(i=>i.id===s.stockItemId);const cost=it?it.cost:(s.cost||0);return{...s,cost,profit:s.price-cost};});
  const oe=orders.map(o=>{
    const items=(o.items||[]).map(it=>{const si=stock.find(i=>i.id===it.stockItemId);const cost=si?si.cost:0;return{...it,cost,lp:(it.price-cost)*it.qty};});
    const gr=items.reduce((a,it)=>a+it.price*it.qty,0);
    const da=o.discount?gr*(o.discount/100):0;
    const rev=gr-da;
    const tc=items.reduce((a,it)=>a+it.cost*it.qty,0);
    return{...o,items,gr,da,rev,profit:rev-tc};
  });
  const now=new Date(),wa=new Date(now-7*86400000),ma=new Date(now-30*86400000);
  const totalRev=se.reduce((a,s)=>a+s.price,0)+oe.reduce((a,o)=>a+o.rev,0);
  const totalProfit=se.reduce((a,s)=>a+s.profit,0)+oe.reduce((a,o)=>a+o.profit,0);
  const totalExp=expenses.reduce((a,e)=>a+e.amount,0);
  const totalNet=totalProfit-totalExp;
  const avgM=totalRev>0?(totalNet/totalRev*100):0;
  const weekRev=[...se,...oe].filter(s=>new Date(s.date||s.createdAt)>=wa).reduce((a,s)=>a+(s.price||s.rev||0),0);
  const monthRev=[...se,...oe].filter(s=>new Date(s.date||s.createdAt)>=ma).reduce((a,s)=>a+(s.price||s.rev||0),0);
  const stockVal=stock.reduce((a,i)=>a+i.qty*i.cost,0);
  const pendAmt=oe.filter(o=>o.status==="pendiente").reduce((a,o)=>a+o.rev,0);
  const cajaSaldo=caja.reduce((a,c)=>a+(c.type==="entrada"?c.amount:-c.amount),0);
  const cajaIn=caja.filter(c=>c.type==="entrada").reduce((a,c)=>a+c.amount,0);
  const cajaOut=caja.filter(c=>c.type==="salida").reduce((a,c)=>a+c.amount,0);
  const accStats=(st.accounts||[]).map(acc=>{const as=se.filter(s=>s.accountId===acc.id);return{...acc,count:as.length,revenue:as.reduce((a,s)=>a+s.price,0),profit:as.reduce((a,s)=>a+s.profit,0)};}).sort((a,b)=>b.revenue-a.revenue);
  const ms={};se.forEach(s=>{if(!ms[s.model])ms[s.model]={count:0,revenue:0};ms[s.model].count++;ms[s.model].revenue+=s.price;});
  const topM=Object.entries(ms).sort((a,b)=>b[1].count-a[1].count).slice(0,5);
  const p={st,upd,se,oe,accStats,topM,stock,expenses,caja,stockAlert,totalUnits,totalRev,totalProfit,totalExp,totalNet,avgM,weekRev,monthRev,stockVal,pendAmt,cajaSaldo,cajaIn,cajaOut};
  return(
    <div className="app">
      <div className="header">
        <div><div className="logo-text">Vinted CRM</div><div className="logo-sub">Panel de control</div></div>
        <div className="header-right">
          <div className={"sync-dot "+sync}/>
          {stockAlert&&<div className="apill apill-red">Reponer stock</div>}
          {oe.filter(o=>o.status==="pendiente").length>0&&<div className="apill apill-yellow">{oe.filter(o=>o.status==="pendiente").length} pendiente{oe.filter(o=>o.status==="pendiente").length>1?"s":""}</div>}
        </div>
      </div>
      <div className="nav">{TABS.map(t=><button key={t} className={"nb"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t}</button>)}</div>
      <div className="content">
        {tab==="Dashboard"&&<Dash {...p}/>}
        {tab==="Ventas"&&<Ventas {...p}/>}
        {tab==="Pedidos"&&<Pedidos {...p}/>}
        {tab==="Stock"&&<Stock {...p}/>}
        {tab==="Gastos"&&<Gastos {...p}/>}
        {tab==="Caja"&&<Caja {...p}/>}
        {tab==="Cuentas"&&<Cuentas {...p}/>}
        {tab==="Alertas"&&<Alertas {...p}/>}
      </div>
    </div>
  );
}

function Dash({totalRev,totalNet,avgM,weekRev,monthRev,se,oe,accStats,topM,stockAlert,totalUnits,stockVal,cajaSaldo,pendAmt}){
  const mr=accStats[0]?.revenue||1,mm=topM[0]?.[1]?.count||1;
  return(
    <div>
      <div className="sec">Resultados</div>
      <div className="g4" style={{marginBottom:10}}>
        {[{l:"Semana",v:f(weekRev),s:"últimos 7 días",c:""},{l:"30 días",v:f(monthRev),s:"últimos 30 días",c:""},{l:"Facturación total",v:f(totalRev),s:`${se.length+oe.length} operaciones`,c:""},{l:"Beneficio neto",v:f(totalNet),s:`Margen ${avgM.toFixed(1)}%`,c:totalNet>=0?"cg":"cr"}].map(k=>(
          <div key={k.l} className="card"><div className="kl">{k.l}</div><div className={"kv "+k.c}>{k.v}</div><div className="ks">{k.s}</div></div>
        ))}
      </div>
      <div className="g4" style={{marginBottom:10}}>
        <div className="card"><div className="kl">Ventas Vinted</div><div className="kv cb">{f(se.reduce((a,s)=>a+s.price,0))}</div><div className="ks">{se.length} ventas</div></div>
        <div className="card"><div className="kl">Pedidos directos</div><div className="kv cp">{f(oe.reduce((a,o)=>a+o.rev,0))}</div><div className="ks">{oe.length} pedidos</div></div>
        <div className="card"><div className="kl">Stock inmovilizado</div><div className="kv cy">{f(stockVal)}</div><div className="ks">{totalUnits} uds disponibles</div></div>
        <div className="card" style={{border:"1px solid "+(cajaSaldo>=0?"#c8f0d8":"#ffd5d5")}}><div className="kl">Saldo caja</div><div className={"kv "+(cajaSaldo>=0?"cg":"cr")}>{f(cajaSaldo)}</div><div className="ks">{pendAmt>0?`+${f(pendAmt)} pendiente`:""}</div></div>
      </div>
      {stockAlert&&<div className="ab abr" style={{marginBottom:10}}><div><div className="abt cr">Hacer pedido — stock bajo</div><div className="abm">{totalUnits} uds totales (mínimo {STOCK_MIN})</div></div></div>}
      <div className="g2">
        <div className="card">
          <div className="sec" style={{marginTop:0,marginBottom:12}}>Cuentas</div>
          {accStats.filter(a=>a.count>0).length===0&&<div className="empty">Sin ventas aún</div>}
          {accStats.filter(a=>a.count>0).map((a,i)=>(
            <div key={a.id} className="mr"><div className="ml">{i+1}. {a.name}</div><div className="mt"><div className="mf" style={{width:`${(a.revenue/mr)*100}%`,background:"#1d1d1f"}}/></div><div className="mv">{a.revenue.toFixed(0)}€</div></div>
          ))}
        </div>
        <div className="card">
          <div className="sec" style={{marginTop:0,marginBottom:12}}>Top modelos</div>
          {topM.length===0&&<div className="empty">Sin ventas aún</div>}
          {topM.map(([model,s],i)=>(
            <div key={model} className="mr"><div className="ml">{i+1}. {model}</div><div className="mt"><div className="mf" style={{width:`${(s.count/mm)*100}%`,background:"#34c759"}}/></div><div className="mv">{s.count} uds</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Ventas({st,upd,se,stock}){
  const blank={sid:"",price:"",aid:(st.accounts||[])[0]?.id||"",date:new Date().toISOString().slice(0,10)};
  const [form,setForm]=useState(blank);
  const [filter,setFilter]=useState("");
  const [eid,setEid]=useState(null);
  const [ef,setEf]=useState(null);
  const opts=stock.map(i=>({id:i.id,label:`${i.model} — ${i.size}`,model:i.model,size:i.size,cost:i.cost,qty:i.qty}));
  const sel=opts.find(o=>o.id===Number(form.sid));
  const prev=sel&&form.price?parseFloat(form.price)-sel.cost:null;
  const add=()=>{
    if(!sel||!form.price)return;
    if(sel.qty<=0){alert("Sin stock disponible.");return;}
    const s={id:Date.now(),stockItemId:sel.id,model:sel.model,size:sel.size,price:parseFloat(form.price),accountId:Number(form.aid),date:form.date,channel:"vinted"};
    upd(st=>({...st,sales:[s,...(st.sales||[])],stock:(st.stock||[]).map(i=>i.id===sel.id?{...i,qty:Math.max(0,i.qty-1)}:i)}));
    setForm(blank);
  };
  const filtered=se.filter(s=>!filter||s.model?.toLowerCase().includes(filter.toLowerCase()));
  return(
    <div>
      <div className="sec">Registrar venta Vinted</div>
      <div className="card" style={{marginBottom:16}}>
        <div className="fr3">
          <div className="fg"><label className="fl">Modelo y talla</label>
            <select className="fi" value={form.sid} onChange={e=>setForm(f=>({...f,sid:Number(e.target.value)}))}>
              <option value="">Seleccionar...</option>
              {opts.filter(o=>o.qty>0).map(o=><option key={o.id} value={o.id}>{o.label} ({o.qty})</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Cuenta</label>
            <select className="fi" value={form.aid} onChange={e=>setForm(f=>({...f,aid:Number(e.target.value)}))}>
              {(st.accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label className="fl">Precio venta (€)</label><input className="fi" type="number" placeholder="0.00" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}/></div>
          <div className="fg">
            {sel&&form.price&&<div className="pp">
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Coste</span><span className="ppv cr">{f(sel.cost)}</span></div>
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Beneficio</span><span className={"ppv "+(prev>=0?"cg":"cr")}>{f(prev)}</span></div>
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Margen</span><span className="ppv">{form.price>0?((prev/parseFloat(form.price))*100).toFixed(1):0}%</span></div>
            </div>}
          </div>
        </div>
        <button className="btn btnp" onClick={add}>Registrar venta</button>
      </div>
      <div className="fb" style={{marginBottom:10}}>
        <div className="sec" style={{margin:0}}>Historial ({filtered.length})</div>
        <input className="fi" style={{width:160}} placeholder="Buscar..." value={filter} onChange={e=>setFilter(e.target.value)}/>
      </div>
      <div className="card">

                </td>
              </tr>;
            })}</tbody>
          </table>}
        </div>
      </div>
      {eid&&<div className="mo" onClick={e=>e.target.className==="mo"&&setEid(null)}>

          <div className="mdt">Editar venta</div>
          <div className="fg"><label className="fl">Precio (€)</label><input className="fi" type="number" value={ef.price} onChange={e=>setEf(f=>({...f,price:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cuenta</label>
            <select className="fi" value={ef.aid} onChange={e=>setEf(f=>({...f,aid:Number(e.target.value)}))}>
              {(st.accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={ef.date} onChange={e=>setEf(f=>({...f,date:e.target.value}))}/></div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btnp" onClick={()=>{upd(x=>({...x,sales:(x.sales||[]).map(v=>v.id===eid?{...v,price:parseFloat(ef.price),accountId:Number(ef.aid),date:ef.date}:v)}));setEid(null);}}>Guardar</button>
            <button className="btn btng" onClick={()=>setEid(null)}>Cancelar</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function Pedidos({st,upd,oe,stock}){
  const [show,setShow]=useState(false);

  const [disc,setDisc]=useState("");
  const [notes,setNotes]=useState("");
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [status,setStatus]=useState("pagado");
  const [items,setItems]=useState([{sid:"",qty:"1",price:""}]);
  const opts=stock.map(i=>({id:i.id,label:`${i.model} — ${i.size}`,qty:i.qty}));
  const addItem=()=>setItems(x=>[...x,{sid:"",qty:"1",price:""}]);
  const removeItem=idx=>setItems(x=>x.filter((_,i)=>i!==idx));
  const updItem=(idx,k,v)=>setItems(x=>x.map((r,i)=>i===idx?{...r,[k]:v}:r));
  const save=()=>{
    if(!client||items.some(it=>!it.sid||!it.price))return;
    const o={id:Date.now(),client,discount:parseFloat(disc)||0,notes,date,status,channel:"directo",createdAt:date,
      items:items.map(it=>({stockItemId:Number(it.sid),qty:parseInt(it.qty)||1,price:parseFloat(it.price)||0}))};
    upd(x=>({...x,orders:[o,...(x.orders||[])],stock:(x.stock||[]).map(i=>{const it=o.items.find(v=>v.stockItemId===i.id);return it?{...i,qty:Math.max(0,i.qty-it.qty)}:i;})}));
    setClient("");setDisc("");setNotes("");setItems([{sid:"",qty:"1",price:""}]);setShow(false);
  };
  return(
    <div>
      <div className="fb" style={{marginBottom:12}}>
        <div className="sec" style={{margin:0}}>Pedidos directos ({oe.length})</div>
        <button className="btn btnp btnsm" onClick={()=>setShow(v=>!v)}>{show?"Cancelar":"Nuevo pedido"}</button>
      </div>
      {show&&<div className="card" style={{marginBottom:16}}>
        <div className="fr3">
          <div className="fg"><label className="fl">Cliente</label><input className="fi" placeholder="Nombre o referencia" value={client} onChange={e=>setClient(e.target.value)}/></div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="fg"><label className="fl">Estado</label>
            <select className="fi" value={status} onChange={e=>setStatus(e.target.value)}>
              <option value="pagado">Pagado</option>
              <option value="pendiente">Pendiente</option>
              <option value="parcial">Parcial</option>
            </select>
          </div>
        </div>
        <div className="sec" style={{fontSize:13,marginBottom:8}}>Productos</div>
        {items.map((it,idx)=>(
          <div key={idx} style={{display:"grid",gridTemplateColumns:"1fr 60px 80px auto",gap:8,marginBottom:8,alignItems:"flex-end"}}>
            <div>
              {idx===0&&<label className="fl">Modelo y talla</label>}
              <select className="fi" value={it.sid} onChange={e=>updItem(idx,"sid",Number(e.target.value))}>
                <option value="">Seleccionar...</option>
                {opts.filter(o=>o.qty>0).map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
              </select>
            </div>
            <div>{idx===0&&<label className="fl">Uds</label>}<input className="fi" type="number" min="1" value={it.qty} onChange={e=>updItem(idx,"qty",e.target.value)}/></div>
            <div>{idx===0&&<label className="fl">Precio u.</label>}<input className="fi" type="number" placeholder="0.00" value={it.price} onChange={e=>updItem(idx,"price",e.target.value)}/></div>
            <div style={{paddingBottom:2}}>{items.length>1&&<button className="btnd" onClick={()=>removeItem(idx)}>—</button>}</div>
          </div>
        ))}
        <button className="btn btng btnsm" onClick={addItem} style={{marginBottom:12}}>+ Producto</button>
        <div className="fr2">
          <div className="fg"><label className="fl">Descuento (%)</label><input className="fi" type="number" placeholder="0" value={disc} onChange={e=>setDisc(e.target.value)}/></div>
          <div className="fg"><label className="fl">Notas</label><input className="fi" placeholder="Opcional" value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        </div>
        <button className="btn btnp" onClick={save}>Guardar pedido</button>
      </div>}
      {oe.length===0?<div className="card"><div className="empty">Sin pedidos</div></div>:

          <div key={o.id} className="card" style={{marginBottom:8}}>

              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:"#86868b"}}>{fd(o.date)}</span>
                <button className="btnd" onClick={()=>upd(x=>({...x,orders:(x.orders||[]).filter(v=>v.id!==o.id)}))}>Eliminar</button>
              </div>
            </div>
            <div className="tw">
              <table className="tbl" style={{minWidth:300}}>
                <thead><tr><th>Modelo</th><th>Talla</th><th>Uds</th><th>Precio</th><th>Coste</th><th>Benef.</th></tr></thead>
                <tbody>{o.items.map((it,i)=>{
                  const si=(st.stock||[]).find(x=>x.id===it.stockItemId);
                  return <tr key={i}>
                    <td style={{fontWeight:600}}>{si?.model||"—"}</td>
                    <td><span className="tag">{si?.size||"—"}</span></td>
                    <td>{it.qty}</td>
                    <td>{f(it.price)}</td>
                    <td style={{color:"#ff3b30"}}>{f(it.cost)}</td>
                    <td><span className={"badge "+(it.lp>=0?"bgg":"bgr")}>{f(it.lp)}</span></td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
            <div className="div"/>

              <span>Bruto: <strong>{f(o.gr)}</strong></span>
              {o.discount>0&&<span style={{color:"#ff3b30"}}>Dto -{o.discount}% ({f(o.da)})</span>}
              <span>Total: <strong>{f(o.rev)}</strong></span>
              <span style={{color:o.profit>=0?"#34c759":"#ff3b30"}}>Beneficio: <strong>{f(o.profit)}</strong></span>
              {o.notes&&<span style={{color:"#86868b"}}>"{o.notes}"</span>}
            </div>
          </div>
        ))
      }
    </div>
  );
}

function Stock({st,upd,stock,totalUnits,stockAlert}){
  const [form,setForm]=useState({model:"",size:"",qty:"",cost:"",alertAt:""});
  const [eid,setEid]=useState(null);
  const [og,setOg]=useState({});
  const [rid,setRid]=useState(null);
  const [rqty,setRqty]=useState("");
  const grouped={};
  stock.forEach(i=>{if(!grouped[i.model])grouped[i.model]=[];grouped[i.model].push(i);});
  const save=()=>{
    if(!form.model||!form.qty)return;
    const e={model:form.model.trim(),size:form.size.trim(),qty:parseInt(form.qty),cost:parseFloat(form.cost)||0,alertAt:parseInt(form.alertAt)||5};
    if(!eid){
      const dup=stock.find(i=>i.model.toLowerCase()===e.model.toLowerCase()&&i.size.toLowerCase()===e.size.toLowerCase());
      if(dup){if(window.confirm(`"${e.model} — ${e.size}" ya existe (${dup.qty} uds). ¿Añadir ${e.qty} uds?`)){upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===dup.id?{...i,qty:i.qty+e.qty}:i)}));setForm({model:"",size:"",qty:"",cost:"",alertAt:""});return;}else return;}
      upd(x=>({...x,stock:[...(x.stock||[]),{...e,id:Date.now()}]}));
    } else {
      upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===eid?{...i,...e}:i)}));setEid(null);
    }
    setForm({model:"",size:"",qty:"",cost:"",alertAt:""});
  };
  const restock=id=>{if(!rqty)return;upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===id?{...i,qty:i.qty+parseInt(rqty)}:i)}));setRid(null);setRqty("");};
  const sv=stock.reduce((a,i)=>a+i.qty*i.cost,0);
  return(
    <div>
      <div className="g3" style={{marginBottom:14}}>
        <div className="card"><div className="kl">Unidades totales</div><div className={"kv "+(stockAlert?"cr":"")}>{totalUnits}</div><div className="ks">{stockAlert?"Hacer pedido":"> 30 OK"}</div></div>
        <div className="card"><div className="kl">Valor stock</div><div className="kv cy">{f(sv)}</div><div className="ks">inmovilizado</div></div>
        <div className="card"><div className="kl">Referencias</div><div className="kv">{stock.length}</div><div className="ks">{Object.keys(grouped).length} modelos</div></div>
      </div>
      {stockAlert&&<div className="ab abr" style={{marginBottom:12}}><div><div className="abt cr">Hacer pedido</div><div className="abm">{totalUnits} uds totales (mínimo {STOCK_MIN})</div></div></div>}
      <div className="sec">{eid?"Editar":"Añadir stock"}</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="fr3">
          <div className="fg"><label className="fl">Modelo</label><input className="fi" placeholder="ej. Real Madrid 2025" value={form.model} onChange={e=>setForm(f=>({...f,model:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Talla</label><input className="fi" placeholder="S/M/L/XL" value={form.size} onChange={e=>setForm(f=>({...f,size:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cantidad</label><input className="fi" type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label className="fl">Coste unit. (€)</label><input className="fi" type="number" value={form.cost} onChange={e=>setForm(f=>({...f,cost:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Alerta individual (uds)</label><input className="fi" type="number" placeholder="5" value={form.alertAt} onChange={e=>setForm(f=>({...f,alertAt:e.target.value}))}/></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btnp" onClick={save}>{eid?"Guardar":"Añadir"}</button>
          {eid&&<button className="btn btng" onClick={()=>{setEid(null);setForm({model:"",size:"",qty:"",cost:"",alertAt:""});}}>Cancelar</button>}
        </div>
      </div>
      <div className="sec">Inventario</div>
      {Object.keys(grouped).length===0&&<div className="card"><div className="empty">Sin stock</div></div>}
      {Object.entries(grouped).map(([model,items])=>{
        const tq=items.reduce((a,i)=>a+i.qty,0),tv=items.reduce((a,i)=>a+i.qty*i.cost,0),isOpen=og[model];
        const hasLow=items.some(i=>i.qty<=(i.alertAt||5)&&i.qty>0),hasOut=items.some(i=>i.qty===0);
        return(
          <div key={model} className="sg">
            <div className="sgh" onClick={()=>setOg(g=>({...g,[model]:!g[model]}))}>
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{model}</div>
                {hasOut&&<span className="badge bgr">Agotado</span>}
                {!hasOut&&hasLow&&<span className="badge bgy">Bajo</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                <div style={{fontSize:11,color:"#86868b",whiteSpace:"nowrap"}}>{tq} uds · {tv.toFixed(0)}€</div>
                <span className={"chv "+(isOpen?"open":"")}>›</span>
              </div>
            </div>
            {isOpen&&<div className="sgb">
              <div className="tw">
                <table className="tbl" style={{minWidth:300}}>
                  <thead><tr><th>Talla</th><th>Stock</th><th>Coste</th><th>Valor</th><th>Estado</th><th></th></tr></thead>
                  <tbody>{items.map(item=>{
                    const pct=Math.min(100,(item.qty/Math.max((item.alertAt||5)*3,9))*100);
                    const col=item.qty===0?"#ff3b30":item.qty<=(item.alertAt||5)?"#ff9500":"#34c759";
                    return <tr key={item.id}>
                      <td><span className="tag">{item.size}</span></td>
                      <td><span style={{fontWeight:700,color:col}}>{item.qty}</span><div className="pbt" style={{width:50}}><div className="pbf" style={{width:pct+"%",background:col}}/></div></td>
                      <td>{f(item.cost)}</td>
                      <td style={{color:"#ff9500"}}>{f(item.qty*item.cost)}</td>
                      <td>{item.qty===0?<span className="badge bgr">Agotado</span>:item.qty<=(item.alertAt||5)?<span className="badge bgy">Bajo</span>:<span className="badge bgg">OK</span>}</td>
                      <td>
                        {rid===item.id?
                          <div style={{display:"flex",gap:4}}>
                            <input className="fi" type="number" placeholder="Uds" style={{width:55,padding:"4px 8px",fontSize:12}} value={rqty} onChange={e=>setRqty(e.target.value)}/>
                            <button className="btn btnp btnsm" onClick={()=>restock(item.id)}>OK</button>
                            <button className="btn btng btnsm" onClick={()=>setRid(null)}>✕</button>
                          </div>:
                          <div style={{display:"flex",gap:4}}>
                            <button className="btne" onClick={()=>{setForm({model:item.model,size:item.size,qty:String(item.qty),cost:String(item.cost),alertAt:String(item.alertAt||5)});setEid(item.id);}}>Editar</button>
                            <button className="btne" style={{color:"#34c759",borderColor:"#c8f0d8"}} onClick={()=>setRid(item.id)}>+Uds</button>
                            <button className="btnd" onClick={()=>upd(x=>({...x,stock:(x.stock||[]).filter(v=>v.id!==item.id)}))}>Eliminar</button>
                          </div>
                        }
                      </td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

function Gastos({st,upd,totalExp}){

  const me=expenses.filter(e=>new Date(e.date)>=ma).reduce((a,e)=>a+e.amount,0);
  const bc=ECATS.map(cat=>({cat,total:expenses.filter(e=>e.category===cat).reduce((a,e)=>a+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mc=bc[0]?.total||1;

  return(
    <div>
      <div className="g3" style={{marginBottom:14}}>
        <div className="card"><div className="kl">Esta semana</div><div className="kv cr">{f(we)}</div></div>
        <div className="card"><div className="kl">30 días</div><div className="kv cr">{f(me)}</div></div>
        <div className="card"><div className="kl">Total</div><div className="kv cr">{f(totalExp)}</div></div>
      </div>
      <div className="sec">Registrar gasto</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="fr3">
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Bolsas x100" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Categoría</label><select className="fi" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{ECATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="fg"><label className="fl">Importe (€)</label><input className="fi" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div className="fg" style={{display:"flex",alignItems:"center",gap:8,paddingTop:18}}>
            <input type="checkbox" id="rec" checked={form.recurrent} onChange={e=>setForm(f=>({...f,recurrent:e.target.checked}))} style={{width:15,height:15,accentColor:"#1d1d1f",cursor:"pointer"}}/>

      <div className="sec">Historial</div>
      <div className="card"><div className="tw">{expenses.length===0?<div className="empty">Sin gastos</div>:
        <table className="tbl"><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th>Importe</th><th></th></tr></thead>
        <tbody>{expenses.map(e=><tr key={e.id}>
          <td style={{color:"#86868b"}}>{fd(e.date)}</td>
          <td style={{fontWeight:600}}>{e.desc}</td>
          <td><span className="tag">{e.category}</span></td>
          <td>{e.recurrent?<span className="badge bgp">Recurrente</span>:<span className="badge bga">Puntual</span>}</td>
          <td style={{color:"#ff3b30",fontWeight:600}}>{f(e.amount)}</td>
          <td><button className="btnd" onClick={()=>upd(x=>({...x,expenses:(x.expenses||[]).filter(v=>v.id!==e.id)}))}>Eliminar</button></td>
        </tr>)}</tbody></table>}
      </div></div>
    </div>
  );
}

      <div className="card" style={{marginBottom:14}}>
        <div className="fr3">
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Cobro pedido Jordi" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Tipo</label>
            <select className="fi" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value,cat:e.target.value==="entrada"?"Venta Vinted":"Compra stock"}))}>
              <option value="entrada">Entrada</option>
              <option value="salida">Salida</option>
            </select>
          </div>
          <div className="fg"><label className="fl">Categoría</label>
            <select className="fi" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>
              {(form.type==="entrada"?CI:CO).map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="fr2">
          <div className="fg"><label className="fl">Importe (€)</label><input className="fi" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
        </div>
        <button className="btn btnp" onClick={add}>Registrar</button>
      </div>
      <div className="sec">Movimientos</div>
      <div className="card"><div className="tw">{caja.length===0?<div className="empty">Sin movimientos</div>:
        <table className="tbl"><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th>Importe</th><th>Saldo</th><th></th></tr></thead>
        <tbody>{(()=>{let s=0;return [...caja].reverse().map(c=>{s+=c.type==="entrada"?c.amount:-c.amount;return <tr key={c.id}>
          <td style={{color:"#86868b"}}>{fd(c.date)}</td>
          <td style={{fontWeight:600}}>{c.desc}</td>
          <td><span className="tag">{c.cat}</span></td>
          <td><span className={"badge "+(c.type==="entrada"?"bgg":"bgr")}>{c.type==="entrada"?"Entrada":"Salida"}</span></td>
          <td style={{color:c.type==="entrada"?"#34c759":"#ff3b30",fontWeight:600}}>{c.type==="entrada"?"+":"-"}{f(c.amount)}</td>
          <td style={{color:s>=0?"#34c759":"#ff3b30",fontWeight:600}}>{f(s)}</td>
          <td><button className="btnd" onClick={()=>upd(x=>({...x,caja:(x.caja||[]).filter(v=>v.id!==c.id)}))}>Eliminar</button></td>
        </tr>;})})()}</tbody></table>}
      </div></div>
    </div>
  );
}

function Cuentas({st,upd,accStats}){
  const [modal,setModal]=useState(null);
  const [spw,setSpw]=useState({});
  const [form,setForm]=useState({name:"",phone:"",email:"",password:"",bank:"",desc:"",tag:""});
  const [nn,setNn]=useState("");
  const tg=tag=>{const p=[["#1a1a2e","#16213e"],["#0f2027","#203a43"],["#1a0533","#2d1b4e"],["#0d1b2a","#1b2838"],["#1c1c1e","#2c2c2e"],["#0a1628","#1e3a5f"],["#1a1a1a","#2d2d2d"],["#0d2137","#1a3a5c"],["#1f1b2e","#352b57"],["#0f1923","#1a2f44"]];if(!tag)return`linear-gradient(135deg,${p[0][0]},${p[0][1]})`;let h=0;for(let i=0;i<tag.length;i++)h=tag.charCodeAt(i)+((h<<5)-h);return`linear-gradient(135deg,${p[Math.abs(h)%p.length][0]},${p[Math.abs(h)%p.length][1]})`;};
  const oe=a=>{setForm({name:a.name,phone:a.phone||"",email:a.email||"",password:a.password||"",bank:a.bank||"",desc:a.desc||"",tag:a.tag||""});setModal(a.id);};
  const se=()=>{upd(x=>({...x,accounts:(x.accounts||[]).map(a=>a.id===modal?{...a,...form}:a)}));setModal(null);};
  const add=()=>{if(!nn.trim())return;upd(x=>({...x,accounts:[...(x.accounts||[]),{id:Date.now(),name:nn.trim(),phone:"",email:"",password:"",bank:"",desc:"",tag:""}]}));setNn("");};
  return(
    <div>
      <div className="sec">Nueva cuenta</div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8}}><input className="fi" style={{flex:1}} placeholder="Nombre..." value={nn} onChange={e=>setNn(e.target.value)}/><button className="btn btnp" onClick={add}>Añadir</button></div>
      </div>
      <div className="sec">Cuentas Vinted</div>
      <div className="g2">
        {accStats.map((a,i)=>{
          const mg=a.revenue>0?(a.profit/a.revenue*100):0;
          return <div key={a.id} className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{background:tg(a.tag),padding:"16px 14px 12px",position:"relative",minHeight:72}}>
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.15)",borderRadius:"14px 14px 0 0"}}/>
              <div style={{position:"relative",zIndex:1}}>
                {a.tag&&<div style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:3}}>{a.tag}</div>}
                <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>{a.name}</div>
                {a.desc&&<div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{a.desc}</div>}
              </div>
            </div>
            <div style={{padding:"12px 14px"}}>
              <div className="fb" style={{marginBottom:10}}>
                <div style={{fontSize:10,color:"#86868b"}}>#{i+1} por facturación</div>
                <div style={{display:"flex",gap:6}}><button className="btne" onClick={()=>oe(a)}>Editar</button><button className="btnd" onClick={()=>upd(x=>({...x,accounts:(x.accounts||[]).filter(v=>v.id!==a.id)}))}>Eliminar</button></div>
              </div>
              <div className="g2" style={{gap:8,marginBottom:10}}>
                <div className="csm"><div className="kl">Ventas</div><div style={{fontSize:16,fontWeight:700}}>{a.count}</div></div>
                <div className="csm"><div className="kl">Facturación</div><div style={{fontSize:16,fontWeight:700}}>{f(a.revenue)}</div></div>
                <div className="csm"><div className="kl">Beneficio</div><div style={{fontSize:14,fontWeight:700,color:"#34c759"}}>{f(a.profit)}</div></div>
                <div className="csm"><div className="kl">Margen</div><div style={{fontSize:14,fontWeight:700,color:mg>20?"#34c759":"#ff9500"}}>{mg.toFixed(1)}%</div></div>
              </div>
              {(a.phone||a.bank||a.password)&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {a.phone&&<span className="ic">{a.phone}</span>}
                {a.bank&&<span className="ic">Banco: {a.bank}</span>}
                {a.password&&<span className="ic">Contraseña guardada</span>}
              </div>}
            </div>
          </div>;
        })}
      </div>
      {modal&&<div className="mo" onClick={e=>e.target.className==="mo"&&setModal(null)}>
        <div className="md">
          <div className="mdt">Editar cuenta</div>
          <div className="fg"><label className="fl">Etiqueta visual</label><input className="fi" placeholder="ej. Principal · Activa" value={form.tag} onChange={e=>setForm(f=>({...f,tag:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Cuenta principal temporada" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Nombre</label><input className="fi" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Teléfono</label><input className="fi" placeholder="+34 600 000 000" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cuenta bancaria</label><input className="fi" placeholder="ej. BBVA · 4521" value={form.bank} onChange={e=>setForm(f=>({...f,bank:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Contraseña</label>
            <div className="pwf"><input className="fi" type={spw[modal]?"text":"password"} value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
              <button className="pwe" onClick={()=>setSpw(p=>({...p,[modal]:!p[modal]}))}>{spw[modal]?"Ocultar":"Ver"}</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}><button className="btn btnp" onClick={se}>Guardar</button><button className="btn btng" onClick={()=>setModal(null)}>Cancelar</button></div>
        </div>
      </div>}
    </div>
  );
}

function Alertas({st,upd,stockAlert,totalUnits}){
  const stock=st.stock||[];
  const cfg=st.alertConfig||{low:5,urgent:2};
  const [c,setC]=useState({low:cfg.low,urgent:cfg.urgent});
  const low=stock.filter(i=>i.qty<=(i.alertAt||cfg.low)&&i.qty>0);
  const out=stock.filter(i=>i.qty===0);
  const save=()=>upd(x=>({...x,alertConfig:{low:parseInt(c.low),urgent:parseInt(c.urgent)}}));
  const restock=item=>{const q=prompt(`¿Cuántas uds añadir a "${item.model}" (${item.size})?`);if(q&&!isNaN(q)&&parseInt(q)>0)upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===item.id?{...i,qty:i.qty+parseInt(q)}:i)}));};
  return(
    <div>
      <div className="sec">Alerta global de pedido</div>
      <div className={"ab "+(stockAlert?"abr":"abg")} style={{marginBottom:14}}>
        <div>
          <div className={"abt "+(stockAlert?"cr":"cg")}>{stockAlert?"Hacer pedido ahora":"Stock suficiente"}</div>
          <div className="abm">{totalUnits} uds totales · mínimo {STOCK_MIN}</div>
        </div>
      </div>
      <div className="sec">Configuración alertas individuales</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="fr2">
          <div className="fg"><label className="fl">Stock bajo (≤ uds)</label><input className="fi" type="number" value={c.low} onChange={e=>setC(v=>({...v,low:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Urgente (≤ uds)</label><input className="fi" type="number" value={c.urgent} onChange={e=>setC(v=>({...v,urgent:e.target.value}))}/></div>
        </div>
        <button className="btn btnp" onClick={save}>Guardar</button>
      </div>
      {out.length>0&&<><div className="sec">Agotados ({out.length})</div>{out.map(item=><div key={item.id} className="ab abr"><div><div className="abt cr">{item.model} · {item.size}</div><div className="abm">Sin stock</div></div><button className="btn btnp btnsm" onClick={()=>restock(item)}>Reponer</button></div>)}</>}
      {low.length>0&&<><div className="sec">Stock bajo ({low.length})</div>{low.map(item=><div key={item.id} className="ab aby"><div><div className="abt cy">{item.model} · {item.size}</div><div className="abm">{item.qty} uds · {f(item.cost)}</div></div><button className="btn btnp btnsm" onClick={()=>restock(item)}>Reponer</button></div>)}</>}
      {out.length===0&&low.length===0&&<div className="ab abg"><div><div className="abt cg">Todo en orden</div><div className="abm">Sin referencias con stock bajo.</div></div></div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
