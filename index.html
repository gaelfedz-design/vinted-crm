<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vinted CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:2px;}
.app{min-height:100vh;}
.hdr{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid #e5e5ea;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.lt{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.ls{font-size:10px;color:#86868b;margin-top:1px;}
.sd{width:6px;height:6px;border-radius:50%;background:#34c759;}
.sd.syncing{background:#ff9500;animation:bl .5s infinite;}
.sd.error{background:#ff3b30;}
.sd.local{background:#007aff;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.3;}}
.pl{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
.plr{background:#fff3f3;color:#ff3b30;border:1px solid #ffd5d5;}
.ply{background:#fff8ec;color:#ff9500;border:1px solid #ffe0a0;}
.nav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid #e5e5ea;display:flex;overflow-x:auto;padding:0 20px;}
.nav::-webkit-scrollbar{display:none;}
.nb{padding:10px 14px;background:none;border:none;color:#86868b;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.nb.active{color:#1d1d1f;border-bottom-color:#1d1d1f;}
.nb:hover:not(.active){color:#1d1d1f;}
.con{padding:16px 20px;max-width:1100px;margin:0 auto;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr;}.r2,.r3{grid-template-columns:1fr !important;}}
.card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:16px;}
.csm{background:#f5f5f7;border-radius:10px;padding:12px;}
.kl{font-size:10px;color:#86868b;font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.kv{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.ks{font-size:11px;color:#86868b;margin-top:3px;}
.cg{color:#34c759 !important;}.cr{color:#ff3b30 !important;}.cy{color:#ff9500 !important;}.cb{color:#007aff !important;}.cp{color:#8b5cf6 !important;}
.sec{font-size:14px;font-weight:600;margin:18px 0 10px;letter-spacing:-.2px;}
.sec:first-child{margin-top:0;}
.btn{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;}
.bp{background:#1d1d1f;color:#fff;}.bp:hover{background:#3a3a3c;}
.bg{background:#f2f2f7;color:#1d1d1f;border:none;}.bg:hover{background:#e5e5ea;}
.bsm{padding:5px 10px;font-size:12px;border-radius:8px;}
.bd{background:transparent;color:#ff3b30;border:1px solid #ffd5d5;padding:4px 9px;font-size:11px;border-radius:7px;cursor:pointer;font-family:inherit;}
.be{background:transparent;color:#007aff;border:1px solid #c7e0ff;padding:4px 9px;font-size:11px;border-radius:7px;cursor:pointer;font-family:inherit;}
.fl{font-size:11px;color:#86868b;margin-bottom:4px;display:block;font-weight:500;}
.fi{width:100%;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:9px;padding:9px 11px;color:#1d1d1f;font-size:13px;outline:none;font-family:inherit;}
.fi:focus{border-color:#1d1d1f;background:#fff;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fg{margin-bottom:10px;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:400px;}
.tbl th{text-align:left;padding:8px 10px;color:#86868b;font-size:10px;font-weight:500;text-transform:uppercase;border-bottom:1px solid #f2f2f7;}
.tbl td{padding:10px;border-bottom:1px solid #f9f9f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:#fafafa;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.bgg{background:#e8faf0;color:#34c759;}.bgr{background:#fff3f3;color:#ff3b30;}.bgy{background:#fff8ec;color:#ff9500;}.bgb{background:#f0f7ff;color:#007aff;}.bgp{background:#f5f0ff;color:#8b5cf6;}.bga{background:#f2f2f7;color:#86868b;}
.tag{display:inline-block;background:#f2f2f7;color:#86868b;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:500;}
.ab{border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.abr{background:#fff3f3;border-left:3px solid #ff3b30;}
.aby{background:#fff8ec;border-left:3px solid #ff9500;}
.abg{background:#e8faf0;border-left:3px solid #34c759;}
.abb{background:#f0f7ff;border-left:3px solid #007aff;}
.abt{font-weight:600;font-size:13px;margin-bottom:2px;}
.abm{font-size:11px;color:#86868b;}
.pbt{height:4px;background:#f2f2f7;border-radius:2px;overflow:hidden;margin-top:4px;}
.pbf{height:100%;border-radius:2px;}
.mr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mr:last-child{margin-bottom:0;}
.ml{font-size:11px;color:#86868b;width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mt{flex:1;height:5px;background:#f2f2f7;border-radius:3px;overflow:hidden;}
.mf{height:100%;border-radius:3px;}
.mv{font-size:11px;color:#1d1d1f;width:50px;text-align:right;flex-shrink:0;font-weight:600;}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.empty{text-align:center;color:#c7c7cc;padding:30px;font-size:13px;}
.div{border:none;border-top:1px solid #f2f2f7;margin:12px 0;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
@media(min-width:600px){.mo{align-items:center;}}
.md{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
@media(min-width:600px){.md{border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);}}
.mdt{font-size:16px;font-weight:700;margin-bottom:18px;}
.pwf{position:relative;}
.pwe{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#86868b;font-size:12px;font-family:inherit;}
.ic{display:inline-flex;align-items:center;background:#f5f5f7;border-radius:7px;padding:3px 8px;font-size:11px;color:#86868b;margin:2px;}
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}
.sp{width:26px;height:26px;border:2px solid #e5e5ea;border-top-color:#1d1d1f;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sg{background:#fff;border:1px solid #e5e5ea;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.sgh{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px;}
.sgh:hover{background:#fafafa;}
.sgb{border-top:1px solid #f2f2f7;padding:10px 14px;}
.chv{font-size:11px;color:#86868b;transition:transform .2s;flex-shrink:0;}
.chv.open{transform:rotate(90deg);}
/* CHART */
.chart-wrap{width:100%;overflow:hidden;}
.bar-chart{display:flex;align-items:stretch;gap:6px;height:96px;padding:0 2px;}
.bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;min-width:0;}
.bar-box{height:76px;width:100%;display:flex;align-items:flex-end;}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s;min-height:2px;}
.bar-lbl{font-size:9px;color:#86868b;margin-top:3px;white-space:nowrap;}
.delta{font-size:11px;font-weight:600;padding:1px 6px;border-radius:6px;}
.delta-up{background:#e8faf0;color:#34c759;}
.delta-down{background:#fff3f3;color:#ff3b30;}
.delta-flat{background:#f2f2f7;color:#86868b;}
.pp{background:#f5f5f7;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;}
.ppi{display:flex;flex-direction:column;gap:2px;}
.ppv{font-size:14px;font-weight:700;}
</style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#86868b;text-align:center;padding:24px;">
    Cargando Vinted CRM... Si este mensaje no desaparece, revisa la conexión a internet o el bloqueo de los CDN de React/Babel.
  </div>
</div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;
const TABS=["Dashboard","Ventas","Pedidos","Stock","Gastos","Caja","Cuentas","Alertas"];
const ECATS=["Packaging","Transporte","Publicidad","Suscripciones","Otro"];
const STOCK_MIN=30;
const FB={apiKey:"AIzaSyDOXzUoalwy-nScM1TaHzGGQ7rnoPnquU4",authDomain:"vinted-crm-bd15e.firebaseapp.com",projectId:"vinted-crm-bd15e"};
const IS={accounts:[{id:1,name:"Cuenta 1",phone:"",email:"",password:"",bank:"",desc:"",tag:""},{id:2,name:"Cuenta 2",phone:"",email:"",password:"",bank:"",desc:"",tag:""}],sales:[],stock:[],expenses:[],orders:[],caja:[],alertConfig:{low:5,urgent:2}};
const STORAGE_KEY="vinted-crm-data-v2";
let db=null;
try{
  if(window.firebase){
    firebase.initializeApp(FB);
    db=firebase.firestore();
  }
}catch(err){
  console.warn("Firebase no disponible, usando almacenamiento local.",err);
}
const f=n=>(parseFloat(n)||0).toFixed(2)+"€";
const num=v=>{const n=parseFloat(v);return Number.isFinite(n)?n:0;};
const int=v=>{const n=parseInt(v,10);return Number.isFinite(n)?n:0;};
const parseDate=d=>{
  if(!d)return new Date(NaN);
  if(d instanceof Date)return d;
  const [y,m,day]=String(d).slice(0,10).split("-").map(Number);
  return y&&m&&day?new Date(y,m-1,day):new Date(d);
};
const fd=d=>d?parseDate(d).toLocaleDateString("es",{day:"2-digit",month:"2-digit",year:"2-digit"}):"—";
const today=()=>{const d=new Date();const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};
const daysAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return d;};
const startDay=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const inRange=(d,from,to)=>{const dd=parseDate(d);return dd>=from&&dd<to;};
const loadLocal=()=>{
  try{return {...IS,...JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")};}
  catch{return IS;}
};
const saveLocal=data=>{
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
  catch(err){console.warn("No se pudo guardar localmente.",err);}
};

function App(){
  const [st,setSt]=useState(()=>loadLocal());
  const [tab,setTab]=useState("Dashboard");
  const [sync,setSync]=useState("syncing");
  useEffect(()=>{
    if(!db){
      setSt(loadLocal());
      setSync("local");
      return;
    }
    const u=db.collection("crm").doc("data").onSnapshot(snap=>{
      const data=snap.exists?{...IS,...snap.data()}:loadLocal();
      setSt(data);
      saveLocal(data);
      if(!snap.exists)db.collection("crm").doc("data").set(data).catch(()=>setSync("local"));
      setSync("synced");
    },()=>{
      setSt(loadLocal());
      setSync("local");
    });
    return()=>u();
  },[]);
  const upd=useCallback(fn=>{
    setSt(prev=>{
      const ns=typeof fn==="function"?fn(prev||loadLocal()):fn;
      saveLocal(ns);
      setSync("syncing");
      if(db){
        db.collection("crm").doc("data").set(ns).then(()=>setSync("synced")).catch(()=>setSync("local"));
      }else{
        setSync("local");
      }
      return ns;
    });
  },[]);
  const stock=st.stock||[];
  const sales=st.sales||[];
  const orders=st.orders||[];
  const expenses=st.expenses||[];
  const caja=st.caja||[];

  // Enrich sales - coste desde stock por id o modelo+talla
  const se=useMemo(()=>sales.map(s=>{
    const it=stock.find(i=>i.id===s.stockItemId)||stock.find(i=>i.model===s.model&&i.size===s.size);
    const cost=s.cost!==undefined&&s.cost!==null&&s.cost!==""?num(s.cost):(it?num(it.cost):0);
    const price=num(s.price);
    return{...s,price,cost,profit:price-cost};
  }),[sales,stock]);

  // Pedidos directos - sin stock, solo nombre+fecha+coste+facturación
  const oe=useMemo(()=>(orders||[]).map(o=>({
    ...o,
    revenue:num(o.revenue),
    cost:num(o.cost),
    profit:num(o.revenue)-num(o.cost),
  })),[orders]);

  // Periodos
  const now=new Date();
  const startOfToday=startDay(now);
  const startOfTomorrow=addDays(startOfToday,1);
  const startOfYesterday=addDays(startOfToday,-1);
  const w0=addDays(startOfToday,-6),w1=addDays(startOfToday,-13);
  const m0=new Date(now.getFullYear(),now.getMonth(),1);
  const m1=new Date(now.getFullYear(),now.getMonth()-1,1);
  const m1end=m0;

  // Ventas por periodo
  const salesToday=se.filter(s=>inRange(s.date,startOfToday,startOfTomorrow));
  const salesYest=se.filter(s=>inRange(s.date,startOfYesterday,startOfToday));
  const salesThisWeek=se.filter(s=>parseDate(s.date)>=w0);
  const salesLastWeek=se.filter(s=>inRange(s.date,w1,w0));
  const salesThisMonth=se.filter(s=>parseDate(s.date)>=m0);
  const salesLastMonth=se.filter(s=>inRange(s.date,m1,m1end));

  // Revenue por periodo (ventas + pedidos)
  const revPeriod=(salArr,ordArr)=>salArr.reduce((a,s)=>a+num(s.price),0)+ordArr.reduce((a,o)=>a+num(o.revenue),0);
  const profitPeriod=(salArr,ordArr)=>salArr.reduce((a,s)=>a+num(s.profit),0)+ordArr.reduce((a,o)=>a+num(o.profit),0);

  const ordToday=oe.filter(o=>inRange(o.date,startOfToday,startOfTomorrow));
  const ordYest=oe.filter(o=>inRange(o.date,startOfYesterday,startOfToday));
  const ordThisWeek=oe.filter(o=>parseDate(o.date)>=w0);
  const ordLastWeek=oe.filter(o=>inRange(o.date,w1,w0));
  const ordThisMonth=oe.filter(o=>parseDate(o.date)>=m0);
  const ordLastMonth=oe.filter(o=>inRange(o.date,m1,m1end));

  const todayRev=revPeriod(salesToday,ordToday);
  const yesterdayRev=revPeriod(salesYest,ordYest);
  const weekRev=revPeriod(salesThisWeek,ordThisWeek);
  const lastWeekRev=revPeriod(salesLastWeek,ordLastWeek);
  const monthRev=revPeriod(salesThisMonth,ordThisMonth);
  const lastMonthRev=revPeriod(salesLastMonth,ordLastMonth);

  const weekProfit=profitPeriod(salesThisWeek,ordThisWeek);
  const lastWeekProfit=profitPeriod(salesLastWeek,ordLastWeek);
  const monthProfit=profitPeriod(salesThisMonth,ordThisMonth);
  const lastMonthProfit=profitPeriod(salesLastMonth,ordLastMonth);

  const weekExp=expenses.filter(e=>parseDate(e.date)>=w0).reduce((a,e)=>a+num(e.amount),0);
  const monthExp=expenses.filter(e=>parseDate(e.date)>=m0).reduce((a,e)=>a+num(e.amount),0);
  const weekNet=weekProfit-weekExp;
  const monthNet=monthProfit-monthExp;

  // Totales
  const totalSalesRev=se.reduce((a,s)=>a+num(s.price),0);
  const totalSalesCost=se.reduce((a,s)=>a+num(s.cost),0);
  const totalOrdersRev=oe.reduce((a,o)=>a+num(o.revenue),0);
  const totalOrdersCost=oe.reduce((a,o)=>a+num(o.cost),0);
  const totalRev=totalSalesRev+totalOrdersRev;
  const totalCost=totalSalesCost+totalOrdersCost;
  const totalProfit=totalRev-totalCost; // Beneficio bruto
  const totalExp=expenses.reduce((a,e)=>a+num(e.amount),0);
  const totalNet=totalProfit-totalExp; // Beneficio neto
  const avgM=totalRev>0?(totalNet/totalRev*100):0;

  const totalUnits=stock.reduce((a,i)=>a+int(i.qty),0);
  const stockAlert=totalUnits<STOCK_MIN;
  const stockVal=stock.reduce((a,i)=>a+int(i.qty)*num(i.cost),0);
  const pendAmt=oe.filter(o=>o.status==="pendiente").reduce((a,o)=>a+num(o.revenue),0);
  const cajaSaldo=caja.reduce((a,c)=>a+(c.type==="entrada"?num(c.amount):-num(c.amount)),0);
  const cajaIn=caja.filter(c=>c.type==="entrada").reduce((a,c)=>a+num(c.amount),0);
  const cajaOut=caja.filter(c=>c.type==="salida").reduce((a,c)=>a+num(c.amount),0);

  const accStats=(st.accounts||[]).map(acc=>{
    const as=se.filter(s=>s.accountId===acc.id);
    return{...acc,count:as.length,revenue:as.reduce((a,s)=>a+num(s.price),0),profit:as.reduce((a,s)=>a+num(s.profit),0)};
  }).sort((a,b)=>b.revenue-a.revenue);

  // Top modelos
  const ms={};
  se.forEach(s=>{const model=s.model||"Sin modelo";if(!ms[model])ms[model]={count:0,revenue:0,profit:0};ms[model].count++;ms[model].revenue+=num(s.price);ms[model].profit+=num(s.profit);});
  const topM=Object.entries(ms).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,5);

  // Ventas por día últimos 7 días
  const dailySales=Array.from({length:7},(_,i)=>{
    const d=addDays(startOfToday,i-6);
    const d2=addDays(d,1);
    const rev=se.filter(s=>inRange(s.date,d,d2)).reduce((a,s)=>a+num(s.price),0)+oe.filter(o=>inRange(o.date,d,d2)).reduce((a,o)=>a+num(o.revenue),0);
    const lbl=d.toLocaleDateString("es",{weekday:"short"});
    return{lbl,rev};
  });

  const p={st,upd,se,oe,accStats,topM,stock,expenses,caja,stockAlert,totalUnits,totalRev,totalCost,totalProfit,totalExp,totalNet,avgM,todayRev,yesterdayRev,weekRev,lastWeekRev,monthRev,lastMonthRev,weekProfit,lastWeekProfit,monthProfit,lastMonthProfit,weekNet,monthNet,stockVal,pendAmt,cajaSaldo,cajaIn,cajaOut,dailySales,totalSalesRev,totalOrdersRev};

  return(
    <div className="app">
      <div className="hdr">
        <div><div className="lt">Vinted CRM</div><div className="ls">Panel de control</div></div>
        <div className="hdr-r">
          <div className={"sd "+sync}/>
          {stockAlert&&<div className="pl plr">Reponer stock</div>}
          {oe.filter(o=>o.status==="pendiente").length>0&&<div className="pl ply">{oe.filter(o=>o.status==="pendiente").length} pendiente{oe.filter(o=>o.status==="pendiente").length>1?"s":""}</div>}
        </div>
      </div>
      <div className="nav">{TABS.map(t=><button key={t} className={"nb"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t}</button>)}</div>
      <div className="con">
        {tab==="Dashboard"&&<Dash {...p}/>}
        {tab==="Ventas"&&<Ventas {...p}/>}
        {tab==="Pedidos"&&<Pedidos {...p}/>}
        {tab==="Stock"&&<Stock {...p}/>}
        {tab==="Gastos"&&<Gastos {...p}/>}
        {tab==="Caja"&&<Caja {...p}/>}
        {tab==="Cuentas"&&<Cuentas {...p}/>}
        {tab==="Alertas"&&<Alertas {...p}/>}
      </div>
    </div>
  );
}

// Delta badge
function Delta({curr,prev,prefix=""}){
  if(!prev)return null;
  const pct=((curr-prev)/prev*100);
  const up=pct>0,flat=Math.abs(pct)<0.5;
  return <span className={"delta "+(flat?"delta-flat":up?"delta-up":"delta-down")}>{up?"+":""}{pct.toFixed(1)}%</span>;
}

// Bar chart component
function BarChart({data,color="#1d1d1f"}){
  const max=Math.max(...data.map(d=>d.rev),1);
  return(
    <div className="chart-wrap">
      <div className="bar-chart">
        {data.map((d,i)=>(
          <div key={i} className="bar-col">
            <div className="bar-box">
              <div className="bar" title={`${d.lbl}: ${f(d.rev)}`} style={{height:`${Math.max((d.rev/max)*100,2)}%`,background:color,opacity:d.rev>0?1:0.2}}/>
            </div>
            <div className="bar-lbl">{d.lbl}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Line chart (simple SVG)
function LineChart({data,color="#007aff"}){
  const max=Math.max(...data.map(d=>d.rev),1);
  const w=300,h=70,pad=4;
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1||1))*(w-pad*2);
    const y=h-pad-(d.rev/max)*(h-pad*2);
    return{x,y,rev:d.rev,lbl:d.lbl};
  });
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:70}}>
        <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color}/>)}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        {data.map((d,i)=><div key={i} style={{fontSize:9,color:"#86868b",textAlign:"center",flex:1}}>{d.lbl}</div>)}
      </div>
    </div>
  );
}

/* ── VENTAS ── */
function Ventas({st,upd,se,stock}){
  const blank={sid:"",price:"",aid:(st.accounts||[])[0]?.id||"",date:today()};
  const [form,setForm]=useState(blank);
  const [filter,setFilter]=useState("");
  const [eid,setEid]=useState(null);
  const [ef,setEf]=useState(null);
  const opts=stock.map(i=>({id:i.id,label:`${i.model} — ${i.size}`,model:i.model,size:i.size,cost:i.cost,qty:i.qty}));
  const sel=opts.find(o=>o.id===Number(form.sid));
  const prev=sel&&form.price?num(form.price)-num(sel.cost):null;
  const add=()=>{
    if(!sel||!form.price)return;
    if(int(sel.qty)<=0){alert("Sin stock disponible.");return;}
    const price=num(form.price);
    if(!Number.isFinite(price)||price<0){alert("Introduce un precio válido.");return;}
    const s={id:Date.now(),stockItemId:sel.id,model:sel.model,size:sel.size,cost:num(sel.cost),price,accountId:Number(form.aid),date:form.date,channel:"vinted"};
    upd(x=>({...x,sales:[s,...(x.sales||[])],stock:(x.stock||[]).map(i=>i.id===sel.id?{...i,qty:Math.max(0,int(i.qty)-1)}:i)}));
    setForm(blank);
  };
  const del=sale=>upd(x=>({
    ...x,
    sales:(x.sales||[]).filter(v=>v.id!==sale.id),
    stock:(x.stock||[]).map(i=>i.id===sale.stockItemId?{...i,qty:int(i.qty)+1}:i)
  }));
  const filtered=se.filter(s=>!filter||s.model?.toLowerCase().includes(filter.toLowerCase()));
  return(
    <div>
      <div className="sec">Registrar venta</div>
      <div className="card" style={{marginBottom:16}}>
        <div className="r3">
          <div className="fg"><label className="fl">Modelo y talla</label>
            <select className="fi" value={form.sid} onChange={e=>setForm(v=>({...v,sid:Number(e.target.value)}))}>
              <option value="">Seleccionar...</option>
              {opts.filter(o=>int(o.qty)>0).map(o=><option key={o.id} value={o.id}>{o.label} ({int(o.qty)})</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Cuenta</label>
            <select className="fi" value={form.aid} onChange={e=>setForm(v=>({...v,aid:Number(e.target.value)}))}>
              {(st.accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(v=>({...v,date:e.target.value}))}/></div>
        </div>
        <div className="r2">
          <div className="fg"><label className="fl">Precio venta (€)</label><input className="fi" type="number" placeholder="0.00" value={form.price} onChange={e=>setForm(v=>({...v,price:e.target.value}))}/></div>
          <div className="fg">
            {sel&&form.price&&<div className="pp">
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Coste</span><span className="ppv cr">{f(sel.cost)}</span></div>
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Beneficio</span><span className={"ppv "+(prev>=0?"cg":"cr")}>{f(prev)}</span></div>
              <div className="ppi"><span style={{fontSize:10,color:"#86868b"}}>Margen</span><span className="ppv">{num(form.price)>0?((prev/num(form.price))*100).toFixed(1):0}%</span></div>
            </div>}
          </div>
        </div>
        <button className="btn bp" onClick={add}>Registrar venta</button>
      </div>
      <div className="fb" style={{marginBottom:10}}>
        <div className="sec" style={{margin:0}}>Historial ({filtered.length})</div>
        <input className="fi" style={{width:160}} placeholder="Buscar..." value={filter} onChange={e=>setFilter(e.target.value)}/>
      </div>
      <div className="card"><div className="tw">
        {filtered.length===0?<div className="empty">Sin ventas</div>:
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Modelo</th><th>Talla</th><th>Cuenta</th><th>Precio</th><th>Coste</th><th>Beneficio</th><th></th></tr></thead>
          <tbody>{filtered.map(s=>{
            const ac=(st.accounts||[]).find(a=>a.id===s.accountId);
            return <tr key={s.id}>
              <td style={{color:"#86868b"}}>{fd(s.date)}</td>
              <td style={{fontWeight:600}}>{s.model}</td>
              <td><span className="tag">{s.size}</span></td>
              <td style={{color:"#86868b"}}>{ac?.name||"—"}</td>
              <td style={{fontWeight:600}}>{f(s.price)}</td>
              <td style={{color:"#ff3b30"}}>{f(s.cost)}</td>
              <td><span className={"badge "+(s.profit>=0?"bgg":"bgr")}>{f(s.profit)}</span></td>
              <td style={{display:"flex",gap:4}}>
                <button className="be" onClick={()=>{setEid(s.id);setEf({price:String(s.price),aid:s.accountId,date:s.date});}}>Editar</button>
                <button className="bd" onClick={()=>del(s)}>Eliminar</button>
              </td>
            </tr>;
          })}</tbody>
        </table>}
      </div></div>
      {eid&&<div className="mo" onClick={e=>e.target.className==="mo"&&setEid(null)}>
        <div className="md">
          <div className="mdt">Editar venta</div>
          <div className="fg"><label className="fl">Precio (€)</label><input className="fi" type="number" value={ef.price} onChange={e=>setEf(v=>({...v,price:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cuenta</label>
            <select className="fi" value={ef.aid} onChange={e=>setEf(v=>({...v,aid:Number(e.target.value)}))}>
              {(st.accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={ef.date} onChange={e=>setEf(v=>({...v,date:e.target.value}))}/></div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn bp" onClick={()=>{
              const price=num(ef.price);
              if(!Number.isFinite(price)||price<0){alert("Introduce un precio válido.");return;}
              upd(x=>({...x,sales:(x.sales||[]).map(v=>v.id===eid?{...v,price,accountId:Number(ef.aid),date:ef.date}:v)}));
              setEid(null);
            }}>Guardar</button>
            <button className="btn bg" onClick={()=>setEid(null)}>Cancelar</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

              const revenue=num(ef.revenue),cost=num(ef.cost);
              if(revenue<0||cost<0){alert("Introduce importes válidos.");return;}
              upd(x=>({...x,orders:(x.orders||[]).map(v=>v.id===eid?{...v,...ef,revenue,cost}:v)}));
              setEid(null);
            }}>Guardar</button>
            <button className="btn bg" onClick={()=>setEid(null)}>Cancelar</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

/* ── STOCK ── */
function Stock({st,upd,stock,totalUnits,stockAlert,se=[]}){
  const [form,setForm]=useState({model:"",size:"",qty:"",cost:"",alertAt:""});
  const [eid,setEid]=useState(null);
  const [og,setOg]=useState({});
  const [rid,setRid]=useState(null);
  const [rqty,setRqty]=useState("");
  const [modelNames,setModelNames]=useState({});
  const [newSize,setNewSize]=useState({});
  const grouped={};
  stock.forEach(i=>{const model=i.model||"Sin modelo";if(!grouped[model])grouped[model]=[];grouped[model].push({...i,model});});
  const save=()=>{
    if(!form.model||!form.qty)return;
    const qty=int(form.qty),cost=num(form.cost),alertAt=int(form.alertAt)||5;
    if(qty<0||cost<0||alertAt<0){alert("Introduce valores válidos.");return;}
    const e={model:form.model.trim(),size:form.size.trim(),qty,cost,alertAt};
    if(!eid){
      const dup=stock.find(i=>(i.model||"").toLowerCase()===e.model.toLowerCase()&&(i.size||"").toLowerCase()===e.size.toLowerCase());
      if(dup){
        if(window.confirm(`"${e.model} — ${e.size}" ya existe (${dup.qty} uds). ¿Añadir ${e.qty} uds más?`)){
          upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===dup.id?{...i,qty:int(i.qty)+e.qty}:i)}));
          setForm({model:"",size:"",qty:"",cost:"",alertAt:""});return;
        }else return;
      }
      upd(x=>({...x,stock:[...(x.stock||[]),{...e,id:Date.now()}]}));
    }else{
      upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===eid?{...i,...e}:i)}));setEid(null);
    }
    setForm({model:"",size:"",qty:"",cost:"",alertAt:""});
  };
  const restock=id=>{const qty=int(rqty);if(qty<=0){alert("Introduce unidades válidas.");return;}upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===id?{...i,qty:int(i.qty)+qty}:i)}));setRid(null);setRqty("");};
  const deleteItem=item=>{
    const linked=(se||[]).filter(s=>s.stockItemId===item.id).length;
    if(linked>0){alert(`No se puede eliminar: esta referencia tiene ${linked} venta${linked!==1?"s":""} asociada${linked!==1?"s":""}. Pon el stock a 0 si ya no la vendes.`);return;}
    upd(x=>({...x,stock:(x.stock||[]).filter(v=>v.id!==item.id)}));
  };
  const renameModel=(oldModel,items)=>{
    const next=(modelNames[oldModel]??oldModel).trim();
    if(!next||next===oldModel)return;
    const ids=items.map(i=>i.id);
    upd(x=>({
      ...x,
      stock:(x.stock||[]).map(i=>ids.includes(i.id)?{...i,model:next}:i),
      sales:(x.sales||[]).map(s=>ids.includes(s.stockItemId)?{...s,model:next}:s)
    }));
    setOg(g=>{const n={...g,[next]:true};delete n[oldModel];return n;});
    setModelNames(v=>{const n={...v};delete n[oldModel];return n;});
  };
  const addSizeToModel=(model,items)=>{
    const draft=newSize[model]||{};
    const size=(draft.size||"").trim();
    const qty=int(draft.qty),cost=num(draft.cost),alertAt=int(draft.alertAt)||5;
    if(!size||qty<=0||cost<0||alertAt<0){alert("Introduce talla, unidades y valores válidos.");return;}
    const dup=items.find(i=>(i.size||"").toLowerCase()===size.toLowerCase());
    if(dup){
      upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===dup.id?{...i,qty:int(i.qty)+qty,cost:cost||num(i.cost),alertAt}:i)}));
    }else{
      upd(x=>({...x,stock:[...(x.stock||[]),{id:Date.now(),model,size,qty,cost,alertAt}]}));
    }
    setNewSize(v=>({...v,[model]:{size:"",qty:"",cost:"",alertAt:""}}));
    setOg(g=>({...g,[model]:true}));
  };
  const sv=stock.reduce((a,i)=>a+int(i.qty)*num(i.cost),0);
  const modelos=Object.keys(grouped).length;
  return(
    <div>
      {/* KPIs */}
      <div className="g3" style={{marginBottom:14}}>
        <div className="card" style={{border:stockAlert?"1px solid #ffd5d5":""}}>
          <div className="kl">Unidades totales</div>
          <div className={"kv "+(stockAlert?"cr":"")}>{totalUnits}</div>
          <div className="ks">{stockAlert?"Hacer pedido ahora":"Stock OK (>30)"}</div>
          <div className="pbt" style={{marginTop:8,width:"100%"}}>
            <div className="pbf" style={{width:`${Math.min(100,(totalUnits/STOCK_MIN)*100)}%`,background:stockAlert?"#ff3b30":"#34c759"}}/>
          </div>
        </div>
        <div className="card"><div className="kl">Valor inmovilizado</div><div className="kv cy">{f(sv)}</div><div className="ks">{modelos} modelos distintos</div></div>
        <div className="card"><div className="kl">Referencias</div><div className="kv">{stock.length}</div><div className="ks">{stock.filter(i=>int(i.qty)===0).length} agotadas</div></div>
      </div>
      {stockAlert&&<div className="ab abr" style={{marginBottom:12}}><div><div className="abt cr">Hacer pedido — {totalUnits} uds (mínimo {STOCK_MIN})</div></div></div>}

      {/* Form */}
      <div className="sec">{eid?"Editar artículo":"Añadir stock"}</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="r3">
          <div className="fg"><label className="fl">Modelo</label><input className="fi" placeholder="ej. Real Madrid 2025" value={form.model} onChange={e=>setForm(v=>({...v,model:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Talla</label><input className="fi" placeholder="S/M/L/XL" value={form.size} onChange={e=>setForm(v=>({...v,size:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cantidad</label><input className="fi" type="number" value={form.qty} onChange={e=>setForm(v=>({...v,qty:e.target.value}))}/></div>
        </div>
        <div className="r2">
          <div className="fg"><label className="fl">Coste unit. (€)</label><input className="fi" type="number" value={form.cost} onChange={e=>setForm(v=>({...v,cost:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Alerta individual (uds)</label><input className="fi" type="number" placeholder="5" value={form.alertAt} onChange={e=>setForm(v=>({...v,alertAt:e.target.value}))}/></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn bp" onClick={save}>{eid?"Guardar":"Añadir"}</button>
          {eid&&<button className="btn bg" onClick={()=>{setEid(null);setForm({model:"",size:"",qty:"",cost:"",alertAt:""});}}>Cancelar</button>}
        </div>
      </div>

      {/* Inventario agrupado */}
      <div className="sec">Inventario — {modelos} modelos</div>
      {modelos===0&&<div className="card"><div className="empty">Sin stock registrado</div></div>}
      {Object.entries(grouped).map(([model,items])=>{
        const tq=items.reduce((a,i)=>a+int(i.qty),0);
        const tv=items.reduce((a,i)=>a+int(i.qty)*num(i.cost),0);
        const isOpen=og[model];
        const hasOut=items.some(i=>int(i.qty)===0);
        const hasLow=items.some(i=>int(i.qty)>0&&int(i.qty)<=((int(i.alertAt)||5)));
        const pct=Math.min(100,(tq/Math.max(items.reduce((a,i)=>a+(int(i.alertAt)||5),0)*2,10))*100);
        const statusColor=hasOut?"#ff3b30":hasLow?"#ff9500":"#34c759";
        const draft=newSize[model]||{size:"",qty:"",cost:"",alertAt:""};
        return(
          <div key={model} className="sg">
            <div className="sgh" onClick={()=>setOg(g=>({...g,[model]:!g[model]}))}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{model}</span>
                  {hasOut&&<span className="badge bgr">Agotado</span>}
                  {!hasOut&&hasLow&&<span className="badge bgy">Stock bajo</span>}
                </div>
                <div className="pbt" style={{width:"100%",maxWidth:200}}>
                  <div className="pbf" style={{width:pct+"%",background:statusColor}}/>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:700,color:statusColor}}>{tq} uds</div>
                  <div style={{fontSize:10,color:"#86868b"}}>{tv.toFixed(0)}€</div>
                </div>
                <span className={"chv "+(isOpen?"open":"")}>›</span>
              </div>
            </div>
            {isOpen&&<div className="sgb">
              <div className="csm" style={{marginBottom:10}}>
                <div className="r2">
                  <div className="fg" style={{marginBottom:0}}>
                    <label className="fl">Editar nombre del modelo</label>
                    <input className="fi" value={modelNames[model]??model} onChange={e=>setModelNames(v=>({...v,[model]:e.target.value}))}/>
                  </div>
                  <div className="fg" style={{marginBottom:0,display:"flex",alignItems:"flex-end",gap:8}}>
                    <button className="btn bg bsm" onClick={()=>setModelNames(v=>({...v,[model]:model}))}>Reset</button>
                    <button className="btn bp bsm" onClick={()=>renameModel(model,items)}>Guardar modelo</button>
                  </div>
                </div>
              </div>
              <div className="csm" style={{marginBottom:10}}>
                <div className="r3">
                  <div className="fg"><label className="fl">Nueva talla</label><input className="fi" placeholder="S/M/L/XL" value={draft.size} onChange={e=>setNewSize(v=>({...v,[model]:{...draft,size:e.target.value}}))}/></div>
                  <div className="fg"><label className="fl">Cantidad</label><input className="fi" type="number" min="1" value={draft.qty} onChange={e=>setNewSize(v=>({...v,[model]:{...draft,qty:e.target.value}}))}/></div>
                  <div className="fg"><label className="fl">Coste unit. (€)</label><input className="fi" type="number" min="0" value={draft.cost} onChange={e=>setNewSize(v=>({...v,[model]:{...draft,cost:e.target.value}}))}/></div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <div className="fg" style={{marginBottom:0,flex:1,maxWidth:180}}><label className="fl">Alerta (uds)</label><input className="fi" type="number" min="0" placeholder="5" value={draft.alertAt} onChange={e=>setNewSize(v=>({...v,[model]:{...draft,alertAt:e.target.value}}))}/></div>
                  <button className="btn bp bsm" onClick={()=>addSizeToModel(model,items)}>Añadir talla</button>
                </div>
              </div>
              <div className="tw">
                <table className="tbl" style={{minWidth:300}}>
                  <thead><tr><th>Talla</th><th>Stock</th><th>Coste</th><th>Valor</th><th>Estado</th><th></th></tr></thead>
                  <tbody>{items.map(item=>{
                    const qty=int(item.qty),cost=num(item.cost),alertAt=int(item.alertAt)||5;
                    const p2=Math.min(100,(qty/Math.max(alertAt*2,4))*100);
                    const c=qty===0?"#ff3b30":qty<=alertAt?"#ff9500":"#34c759";
                    return <tr key={item.id}>
                      <td><span className="tag">{item.size}</span></td>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontWeight:700,color:c,fontSize:14}}>{qty}</span>
                          <div className="pbt" style={{width:50,flexShrink:0}}><div className="pbf" style={{width:p2+"%",background:c}}/></div>
                        </div>
                      </td>
                      <td>{f(cost)}</td>
                      <td style={{color:"#ff9500"}}>{f(qty*cost)}</td>
                      <td>{qty===0?<span className="badge bgr">Agotado</span>:qty<=alertAt?<span className="badge bgy">Bajo</span>:<span className="badge bgg">OK</span>}</td>
                      <td>
                        {rid===item.id?
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <input className="fi" type="number" placeholder="Uds" style={{width:55,padding:"4px 8px",fontSize:12}} value={rqty} onChange={e=>setRqty(e.target.value)}/>
                            <button className="btn bp bsm" onClick={()=>restock(item.id)}>OK</button>
                            <button className="btn bg bsm" onClick={()=>setRid(null)}>✕</button>
                          </div>:
                          <div style={{display:"flex",gap:4}}>
                            <button className="be" onClick={()=>{setForm({model:item.model,size:item.size,qty:String(item.qty),cost:String(item.cost),alertAt:String(item.alertAt||5)});setEid(item.id);}}>Editar</button>
                            <button className="be" style={{color:"#34c759",borderColor:"#c8f0d8"}} onClick={()=>setRid(item.id)}>+Uds</button>
                            <button className="bd" onClick={()=>deleteItem(item)}>Eliminar</button>
                          </div>
                        }
                      </td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

/* ── GASTOS ── */
function Gastos({st,upd,totalExp}){
  const [form,setForm]=useState({desc:"",category:"Packaging",amount:"",date:today(),recurrent:false});
  const expenses=st.expenses||[];
  const wa=daysAgo(7),ma=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  const we=expenses.filter(e=>parseDate(e.date)>=wa).reduce((a,e)=>a+num(e.amount),0);
  const me=expenses.filter(e=>parseDate(e.date)>=ma).reduce((a,e)=>a+num(e.amount),0);
  const bc=ECATS.map(cat=>({cat,total:expenses.filter(e=>e.category===cat).reduce((a,e)=>a+num(e.amount),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mc=bc[0]?.total||1;
  const add=()=>{if(!form.desc||!form.amount)return;const amount=num(form.amount);if(amount<0){alert("Introduce un importe válido.");return;}upd(x=>({...x,expenses:[{...form,id:Date.now(),amount},...(x.expenses||[])]}));setForm(v=>({...v,desc:"",amount:""}));};
  return(
    <div>
      <div className="g3" style={{marginBottom:14}}>
        <div className="card"><div className="kl">Esta semana</div><div className="kv cr">{f(we)}</div></div>
        <div className="card"><div className="kl">Este mes</div><div className="kv cr">{f(me)}</div></div>
        <div className="card"><div className="kl">Total acumulado</div><div className="kv cr">{f(totalExp)}</div></div>
      </div>
      <div className="sec">Registrar gasto</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="r3">
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Bolsas x100" value={form.desc} onChange={e=>setForm(v=>({...v,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Categoría</label><select className="fi" value={form.category} onChange={e=>setForm(v=>({...v,category:e.target.value}))}>{ECATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="fg"><label className="fl">Importe (€)</label><input className="fi" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(v=>({...v,amount:e.target.value}))}/></div>
        </div>
        <div className="r2">
          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(v=>({...v,date:e.target.value}))}/></div>
          <div className="fg" style={{display:"flex",alignItems:"center",gap:8,paddingTop:18}}>
            <input type="checkbox" id="rec" checked={form.recurrent} onChange={e=>setForm(v=>({...v,recurrent:e.target.checked}))} style={{width:15,height:15,accentColor:"#1d1d1f",cursor:"pointer"}}/>
            <label htmlFor="rec" style={{fontSize:12,color:"#86868b",cursor:"pointer"}}>Recurrente mensual</label>
          </div>
        </div>
        <button className="btn bp" onClick={add}>Añadir gasto</button>
      </div>
      {bc.length>0&&<><div className="sec">Por categoría</div><div className="card" style={{marginBottom:14}}>{bc.map(({cat,total})=><div key={cat} className="mr"><div className="ml">{cat}</div><div className="mt"><div className="mf" style={{width:`${(total/mc)*100}%`,background:"#ff3b30"}}/></div><div className="mv">{total.toFixed(0)}€</div></div>)}</div></>}
      <div className="sec">Historial</div>
      <div className="card"><div className="tw">{expenses.length===0?<div className="empty">Sin gastos</div>:
        <table className="tbl"><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th>Importe</th><th></th></tr></thead>
        <tbody>{expenses.map(e=><tr key={e.id}>
          <td style={{color:"#86868b"}}>{fd(e.date)}</td>
          <td style={{fontWeight:600}}>{e.desc}</td>
          <td><span className="tag">{e.category}</span></td>
          <td>{e.recurrent?<span className="badge bgp">Recurrente</span>:<span className="badge bga">Puntual</span>}</td>
          <td style={{color:"#ff3b30",fontWeight:600}}>{f(e.amount)}</td>
          <td><button className="bd" onClick={()=>upd(x=>({...x,expenses:(x.expenses||[]).filter(v=>v.id!==e.id)}))}>Eliminar</button></td>
        </tr>)}</tbody></table>}
      </div></div>
    </div>
  );
}

/* ── CAJA ── */

      <div className="sec">Registrar movimiento</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="r3">
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Cobro pedido Jordi" value={form.desc} onChange={e=>setForm(v=>({...v,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Tipo</label>

        <div className="r2">

          <div className="fg"><label className="fl">Fecha</label><input className="fi" type="date" value={form.date} onChange={e=>setForm(v=>({...v,date:e.target.value}))}/></div>
        </div>
        <button className="btn bp" onClick={add}>Registrar</button>
      </div>
      <div className="sec">Movimientos</div>
      <div className="card"><div className="tw">{caja.length===0?<div className="empty">Sin movimientos</div>:
        <table className="tbl"><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th>Importe</th><th>Saldo</th><th></th></tr></thead>
        <tbody>{(()=>{let s=0;return [...caja].reverse().map(c=>{s+=c.type==="entrada"?num(c.amount):-num(c.amount);return <tr key={c.id}>
          <td style={{color:"#86868b"}}>{fd(c.date)}</td>
          <td style={{fontWeight:600}}>{c.desc}</td>
          <td><span className="tag">{c.cat}</span></td>
          <td><span className={"badge "+(c.type==="entrada"?"bgg":"bgr")}>{c.type==="entrada"?"Entrada":"Salida"}</span></td>
          <td style={{color:c.type==="entrada"?"#34c759":"#ff3b30",fontWeight:600}}>{c.type==="entrada"?"+":"-"}{f(c.amount)}</td>
          <td style={{color:s>=0?"#34c759":"#ff3b30",fontWeight:600}}>{f(s)}</td>
          <td><button className="bd" onClick={()=>upd(x=>({...x,caja:(x.caja||[]).filter(v=>v.id!==c.id)}))}>Eliminar</button></td>
        </tr>;})})()}</tbody></table>}
      </div></div>
    </div>
  );
}

function Cuentas({st,upd,accStats}){
  const [modal,setModal]=useState(null);
  const [spw,setSpw]=useState({});
  const [form,setForm]=useState({name:"",phone:"",email:"",password:"",bank:"",desc:"",tag:""});
  const [nn,setNn]=useState("");
  const tg=tag=>{const p=[["#1a1a2e","#16213e"],["#0f2027","#203a43"],["#1a0533","#2d1b4e"],["#0d1b2a","#1b2838"],["#1c1c1e","#2c2c2e"],["#0a1628","#1e3a5f"],["#1a1a1a","#2d2d2d"],["#0d2137","#1a3a5c"],["#1f1b2e","#352b57"],["#0f1923","#1a2f44"]];if(!tag)return`linear-gradient(135deg,${p[0][0]},${p[0][1]})`;let h=0;for(let i=0;i<tag.length;i++)h=tag.charCodeAt(i)+((h<<5)-h);return`linear-gradient(135deg,${p[Math.abs(h)%p.length][0]},${p[Math.abs(h)%p.length][1]})`;};
  const oe=a=>{setForm({name:a.name,phone:a.phone||"",email:a.email||"",password:a.password||"",bank:a.bank||"",desc:a.desc||"",tag:a.tag||""});setModal(a.id);};
  const se=()=>{upd(x=>({...x,accounts:(x.accounts||[]).map(a=>a.id===modal?{...a,...form}:a)}));setModal(null);};
  const add=()=>{if(!nn.trim())return;upd(x=>({...x,accounts:[...(x.accounts||[]),{id:Date.now(),name:nn.trim(),phone:"",email:"",password:"",bank:"",desc:"",tag:""}]}));setNn("");};
  return(
    <div>
      <div className="sec">Nueva cuenta</div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8}}><input className="fi" style={{flex:1}} placeholder="Nombre..." value={nn} onChange={e=>setNn(e.target.value)}/><button className="btn bp" onClick={add}>Añadir</button></div>
      </div>
      <div className="sec">Cuentas Vinted</div>
      <div className="g2">
        {accStats.map((a,i)=>{
          const mg=a.revenue>0?(a.profit/a.revenue*100):0;
          return <div key={a.id} className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{background:tg(a.tag),padding:"16px 14px 12px",position:"relative",minHeight:72}}>
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.15)",borderRadius:"14px 14px 0 0"}}/>
              <div style={{position:"relative",zIndex:1}}>
                {a.tag&&<div style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:3}}>{a.tag}</div>}
                <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>{a.name}</div>
                {a.desc&&<div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{a.desc}</div>}
              </div>
            </div>
            <div style={{padding:"12px 14px"}}>
              <div className="fb" style={{marginBottom:10}}>
                <div style={{fontSize:10,color:"#86868b"}}>#{i+1} por facturación</div>
                <div style={{display:"flex",gap:6}}><button className="be" onClick={()=>oe(a)}>Editar</button><button className="bd" onClick={()=>upd(x=>({...x,accounts:(x.accounts||[]).filter(v=>v.id!==a.id)}))}>Eliminar</button></div>
              </div>
              <div className="g2" style={{gap:8,marginBottom:10}}>
                <div className="csm"><div className="kl">Ventas</div><div style={{fontSize:16,fontWeight:700}}>{a.count}</div></div>
                <div className="csm"><div className="kl">Facturación</div><div style={{fontSize:16,fontWeight:700}}>{f(a.revenue)}</div></div>
                <div className="csm"><div className="kl">Beneficio</div><div style={{fontSize:14,fontWeight:700,color:"#34c759"}}>{f(a.profit)}</div></div>
                <div className="csm"><div className="kl">Margen</div><div style={{fontSize:14,fontWeight:700,color:mg>20?"#34c759":"#ff9500"}}>{mg.toFixed(1)}%</div></div>
              </div>
              {(a.phone||a.bank||a.password)&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {a.phone&&<span className="ic">{a.phone}</span>}
                {a.bank&&<span className="ic">Banco: {a.bank}</span>}
                {a.password&&<span className="ic">Contraseña guardada</span>}
              </div>}
            </div>
          </div>;
        })}
      </div>
      {modal&&<div className="mo" onClick={e=>e.target.className==="mo"&&setModal(null)}>
        <div className="md">
          <div className="mdt">Editar cuenta</div>
          <div className="fg"><label className="fl">Etiqueta visual</label><input className="fi" placeholder="ej. Principal · Activa" value={form.tag} onChange={e=>setForm(v=>({...v,tag:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Descripción</label><input className="fi" placeholder="ej. Cuenta principal temporada" value={form.desc} onChange={e=>setForm(v=>({...v,desc:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Nombre</label><input className="fi" value={form.name} onChange={e=>setForm(v=>({...v,name:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Teléfono</label><input className="fi" placeholder="+34 600 000 000" value={form.phone} onChange={e=>setForm(v=>({...v,phone:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>setForm(v=>({...v,email:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Cuenta bancaria</label><input className="fi" placeholder="ej. BBVA · 4521" value={form.bank} onChange={e=>setForm(v=>({...v,bank:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Contraseña</label>
            <div className="pwf"><input className="fi" type={spw[modal]?"text":"password"} value={form.password} onChange={e=>setForm(v=>({...v,password:e.target.value}))}/>
              <button className="pwe" onClick={()=>setSpw(p=>({...p,[modal]:!p[modal]}))}>Ver</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}><button className="btn bp" onClick={se}>Guardar</button><button className="btn bg" onClick={()=>setModal(null)}>Cancelar</button></div>
        </div>
      </div>}
    </div>
  );
}

/* ── ALERTAS ── */
function Alertas({st,upd,stockAlert,totalUnits}){
  const stock=st.stock||[];
  const cfg=st.alertConfig||{low:5,urgent:2};
  const [c,setC]=useState({low:cfg.low,urgent:cfg.urgent});
  const low=stock.filter(i=>int(i.qty)>0&&int(i.qty)<=(int(i.alertAt)||int(cfg.low)||5));
  const out=stock.filter(i=>int(i.qty)===0);
  const save=()=>upd(x=>({...x,alertConfig:{low:int(c.low),urgent:int(c.urgent)}}));
  const restock=item=>{const q=int(prompt(`¿Cuántas uds añadir a "${item.model}" (${item.size})?`));if(q>0)upd(x=>({...x,stock:(x.stock||[]).map(i=>i.id===item.id?{...i,qty:int(i.qty)+q}:i)}));};
  return(
    <div>
      <div className="sec">Alerta global de pedido</div>
      <div className={"ab "+(stockAlert?"abr":"abg")} style={{marginBottom:14}}>
        <div>
          <div className={"abt "+(stockAlert?"cr":"cg")}>{stockAlert?"Hacer pedido ahora":"Stock suficiente"}</div>
          <div className="abm">{totalUnits} uds totales · mínimo {STOCK_MIN}</div>
        </div>
      </div>
      <div className="sec">Configuración</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="r2">
          <div className="fg"><label className="fl">Alerta "Stock bajo" (≤ uds)</label><input className="fi" type="number" value={c.low} onChange={e=>setC(v=>({...v,low:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Alerta "Urgente" (≤ uds)</label><input className="fi" type="number" value={c.urgent} onChange={e=>setC(v=>({...v,urgent:e.target.value}))}/></div>
        </div>
        <button className="btn bp" onClick={save}>Guardar</button>
      </div>
      {out.length>0&&<><div className="sec">Agotados ({out.length})</div>{out.map(item=><div key={item.id} className="ab abr"><div><div className="abt cr">{item.model} · {item.size}</div><div className="abm">Sin stock</div></div><button className="btn bp bsm" onClick={()=>restock(item)}>Reponer</button></div>)}</>}
      {low.length>0&&<><div className="sec">Stock bajo ({low.length})</div>{low.map(item=><div key={item.id} className="ab aby"><div><div className="abt cy">{item.model} · {item.size}</div><div className="abm">{item.qty} uds · {f(item.cost)}</div></div><button className="btn bp bsm" onClick={()=>restock(item)}>Reponer</button></div>)}</>}
      {out.length===0&&low.length===0&&<div className="ab abg"><div><div className="abt cg">Todo en orden</div><div className="abm">Sin referencias con stock bajo.</div></div></div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
